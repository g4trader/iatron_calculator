name: Prisma Migrate Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        type: choice
        required: true
        options:
          - staging
          - production
      production_confirmation:
        description: "Type APPLY PRODUCTION MIGRATIONS to run against production"
        required: false
        default: ""

jobs:
  migrate:
    name: Apply Prisma migrations
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    defaults:
      run:
        working-directory: frontend
    env:
      IATRON_ENV: ${{ inputs.target }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      ALLOW_PRODUCTION_MIGRATIONS: ${{ inputs.target == 'production' && inputs.production_confirmation == 'APPLY PRODUCTION MIGRATIONS' && 'true' || 'false' }}
    steps:
      - name: Block unsafe production run
        if: ${{ inputs.target == 'production' && inputs.production_confirmation != 'APPLY PRODUCTION MIGRATIONS' }}
        run: |
          echo "Production migrations require exact confirmation."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Migration status before deploy
        run: npx prisma migrate status

      - name: Apply migrations
        run: npm run prisma:deploy

      - name: Migration status after deploy
        run: npx prisma migrate status
